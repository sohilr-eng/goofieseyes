<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Journal | GoofiesEyes</title>
  <meta name="description" content="A journal entry from GoofiesEyes — behind the lens." />
  <link rel="canonical" href="https://www.goofieseyes.com/journal.html" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent: #C9927A; --accent-light: #E0B89A; --accent-rgb: 201, 146, 122;
      --bg: #0D0B09; --bg-2: #141210;
      --text: #F0EBE5; --text-muted: #6B6056; --text-secondary: #9A8E85;
      --font-display: 'Space Grotesk', sans-serif; --font-body: 'Archivo', sans-serif; --font-mono: 'JetBrains Mono', monospace;
      --card-bg: rgba(255,255,255,0.025); --card-border: rgba(255,255,255,0.055); --radius: 12px;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); -webkit-font-smoothing: antialiased; overflow-x: hidden; line-height: 1.6; }
    ::selection { background: var(--accent); color: #fff; }
    h1, h2, h3, h4 { font-family: var(--font-display); }

    /* ─── NAVBAR ─── */
    #navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; padding: 0 8px; }
    .nav-inner {
      max-width: 840px; margin: 10px auto 0;
      background: rgba(13,11,9,0.75); border: 1px solid var(--card-border);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-radius: 100px; padding: 10px 28px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo .logo-name { font-family: var(--font-display); font-weight: 700; font-size: 1rem; color: var(--text); }
    .nav-links { display: flex; align-items: center; gap: 28px; }
    .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 0.88rem; font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }
    .nav-cta { color: var(--accent) !important; border: 1px solid rgba(var(--accent-rgb),0.35); padding: 7px 18px; border-radius: 100px; transition: all 0.25s ease !important; }
    .nav-cta:hover { background: var(--accent) !important; color: #fff !important; }
    @media (max-width: 768px) { .nav-links { display: none; } }

    /* ─── POST LAYOUT ─── */
    .post-wrapper { max-width: 780px; margin: 0 auto; padding: 140px 32px 120px; }

    .back-link {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--font-mono); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--text-muted); text-decoration: none; margin-bottom: 56px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }
    .back-link::before { content: '←'; }

    .post-meta { display: flex; gap: 16px; font-family: var(--font-mono); font-size: 0.75rem; color: var(--accent); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
    .post-meta .dot { color: var(--text-muted); }

    .post-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .post-tag { font-family: var(--font-mono); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); border: 1px solid var(--card-border); padding: 2px 10px; border-radius: 100px; }

    .post-title { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 700; letter-spacing: -0.04em; line-height: 1.1; color: var(--text); margin-bottom: 48px; }

    .post-hero { width: 100%; aspect-ratio: 16/9; border-radius: var(--radius); overflow: hidden; margin-bottom: 56px; background: #1a1816; }
    .post-hero img { width: 100%; height: 100%; object-fit: cover; filter: contrast(1.05); }

    .post-body { font-size: 1.15rem; color: var(--text-secondary); font-weight: 300; line-height: 1.85; }
    .post-body p { margin-bottom: 28px; }
    .post-body p:first-of-type::first-letter {
      font-family: var(--font-display); font-size: 4rem; float: left;
      margin: 8px 16px 0 0; line-height: 0.8; color: var(--accent-light); font-weight: 700;
    }
    .post-body blockquote {
      margin: 48px 0; padding: 32px; border-left: 4px solid var(--accent);
      background: rgba(var(--accent-rgb), 0.05); font-style: italic; font-size: 1.2rem; color: var(--text);
      border-radius: 0 var(--radius) var(--radius) 0;
    }

    #post-error { text-align: center; color: var(--text-muted); font-family: var(--font-mono); padding: 80px 0; }

    /* ─── FOOTER ─── */
    footer { border-top: 1px solid var(--card-border); padding: 64px 32px 40px; text-align: center; }
    .footer-logo { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .footer-logo .logo-name { font-family: var(--font-display); font-weight: 700; color: var(--text-secondary); }
    .footer-links { display: flex; justify-content: center; gap: 28px; margin-bottom: 24px; flex-wrap: wrap; }
    .footer-links a { color: var(--text-muted); text-decoration: none; font-size: 0.85rem; transition: color 0.2s; }
    .footer-links a:hover { color: var(--accent); }
    .footer-copy { color: var(--text-muted); font-size: 0.78rem; font-family: var(--font-mono); }
    img { -webkit-user-drag: none; user-drag: none; -webkit-user-select: none; user-select: none; }
  </style>
  
  <!-- Vercel Web Analytics -->
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body>

<nav id="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <svg class="logo-mark" viewBox="0 0 52 26" width="40" height="20" fill="none">
        <path d="M3 13 C10 4.5 42 4.5 49 13 C42 21.5 10 21.5 3 13Z" stroke="#C9927A" stroke-width="1.5" fill="none"/>
        <circle cx="26" cy="13" r="7" stroke="#C9927A" stroke-width="1.2" fill="none"/>
        <circle cx="26" cy="13" r="3" fill="#C9927A"/>
      </svg>
      <span class="logo-name">GoofiesEyes</span>
    </a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="portfolios.html">Portfolios</a>
      <a href="prints.html">Prints</a>
      <a href="journal.html" class="active">Journal</a>
      <a href="index.html#specs">About</a>
      <a href="index.html#cta" class="nav-cta">Book a Session</a>
    </div>
  </div>
</nav>

<div class="post-wrapper">
  <a href="journal.html" class="back-link">Back to Journal</a>
  <div id="post-content"></div>
  <p id="post-error" style="display:none;">Entry not found.</p>
</div>

<footer>
  <div class="footer-logo">
    <svg viewBox="0 0 52 26" width="36" height="18" fill="none">
      <path d="M3 13 C10 4.5 42 4.5 49 13 C42 21.5 10 21.5 3 13Z" stroke="#C9927A" stroke-width="1.5" fill="none"/>
      <circle cx="26" cy="13" r="7" stroke="#C9927A" stroke-width="1.2" fill="none"/>
      <circle cx="26" cy="13" r="3" fill="#C9927A"/>
    </svg>
    <span class="logo-name">GoofiesEyes</span>
  </div>
  <div class="footer-links">
    <a href="index.html">Home</a>
    <a href="portfolios.html">Portfolios</a>
    <a href="prints.html">Prints</a>
    <a href="journal.html">Journal</a>
    <a href="index.html#specs">About</a>
    <a href="index.html#cta">Contact</a>
  </div>
  <p class="footer-copy">&copy; 2026 GoofiesEyes. All rights reserved. Made with light &amp; obsession.</p>
</footer>

<script>
  function bodyToHTML(text) {
    // Split into blocks by blank lines
    const blocks = text.split(/\n\n+/);
    return blocks.map(block => {
      block = block.trim();
      if (!block) return '';
      // Blockquote: lines starting with >
      if (block.startsWith('>')) {
        const inner = block.replace(/^>\s?/gm, '').trim();
        return `<blockquote>${inner}</blockquote>`;
      }
      return `<p>${block.replace(/\n/g, '<br>')}</p>`;
    }).join('');
  }

  async function loadPost() {
    const slug = new URLSearchParams(window.location.search).get('slug');
    const content = document.getElementById('post-content');
    const error = document.getElementById('post-error');

    if (!slug) { error.style.display = 'block'; return; }

    try {
      const res = await fetch('/content/data/journal.json');
      if (!res.ok) throw new Error('Failed to load journal');
      const { posts } = await res.json();

      const post = posts.find(p => p.slug === slug);
      if (!post) { error.style.display = 'block'; return; }

      // Update page title and meta
      document.title = `${post.title} | GoofiesEyes Journal`;

      const date = post.date
        ? new Date(post.date + 'T00:00:00').toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
        : '';

      const heroHTML = post.coverImage
        ? `<div class="post-hero"><img src="/content/photos/${post.coverImage}" alt="${post.title}"></div>`
        : '';

      const tagsHTML = (post.tags || []).length
        ? `<div class="post-tags">${post.tags.map(t => `<span class="post-tag">${t}</span>`).join('')}</div>`
        : '';

      content.innerHTML = `
        <div class="post-meta">
          <span>${date}</span>
          ${post.tags && post.tags.length ? `<span class="dot">·</span><span>${post.tags.join(' · ')}</span>` : ''}
        </div>
        ${tagsHTML}
        <h1 class="post-title">${post.title}</h1>
        ${heroHTML}
        <div class="post-body">${bodyToHTML(post.body || '')}</div>
      `;
    } catch (err) {
      error.textContent = 'Could not load this entry.';
      error.style.display = 'block';
      console.error(err);
    }
  }

  loadPost();

  document.addEventListener('contextmenu', e => { if (e.target.tagName === 'IMG') e.preventDefault(); });
  document.addEventListener('dragstart',   e => { if (e.target.tagName === 'IMG') e.preventDefault(); });
</script>

</body>
</html>
